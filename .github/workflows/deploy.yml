name: Deploy (produção)

# Deploy automático da Aura Clinic a cada push na main.
# Também pode ser disparado manualmente em Actions > Deploy (produção) > Run workflow.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Nunca deixa dois deploys rodarem ao mesmo tempo (o segundo espera o primeiro).
concurrency:
  group: deploy-producao
  cancel-in-progress: false

env:
  SERVER_HOST: 187.77.225.233
  SERVER_USER: root
  API_URL: https://auraclinic.monitence.com/api
  SITE_URL: https://auraclinic.monitence.com
  REMOTE_COMPOSE_DIR: /home/auraclinic
  REMOTE_BACKEND: /home/auraclinic/backend
  REMOTE_FRONT: /home/nginx/front/auraclinic

jobs:
  # Sem o secret da chave SSH não há como deployar — pula (verde) com um aviso,
  # em vez de falhar. Assim o primeiro push não quebra antes da configuração.
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Secret DEPLOY_SSH_KEY ausente — deploy pulado. Configure em Settings > Secrets and variables > Actions e rode de novo."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configurar chave SSH
        run: |
          install -m 600 /dev/null "$GITHUB_WORKSPACE/.deploy_key"
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > "$GITHUB_WORKSPACE/.deploy_key"
          ssh-keyscan -H "$SERVER_HOST" > "$GITHUB_WORKSPACE/.known_hosts" 2>/dev/null

      - name: Deploy
        env:
          SSH_OPTS: -i ${{ github.workspace }}/.deploy_key -o UserKnownHostsFile=${{ github.workspace }}/.known_hosts -o StrictHostKeyChecking=yes
        run: bash scripts/deploy.sh

      - name: Limpar chave
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/.deploy_key" "$GITHUB_WORKSPACE/.known_hosts"
